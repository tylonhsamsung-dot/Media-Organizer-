name: Build Media Organizer EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller watchdog requests pystray pillow

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "MediaOrganizer" media_organizer.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaOrganizer
          path: dist/MediaOrganizer.exe
